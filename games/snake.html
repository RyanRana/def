<!DOCTYPE html>
<html>
<head>
  <title>Basic Snake HTML Game</title>
  <meta charset="UTF-8">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    border: 1px solid white;
  }
  </style>
</head>
<body>
<canvas width="400" height="400" id="game"></canvas>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

// the canvas width & height, snake x & y, and the apple x & y, all need to be a multiples of the grid size in order for collision detection to work
// (e.g. 16 * 25 = 400)
var grid = 16;
var count = 0;

var snake = {
  x: 160,
  y: 160,

  // snake velocity. moves one grid length every frame in either the x or y direction
  dx: grid,
  dy: 0,

  // keep track of all grids the snake body occupies
  cells: [],

  // length of the snake. grows when eating an apple
  maxCells: 4
};
var apple = {
  x: 320,
  y: 320
};

// Bonus apples — extra rewards spawned by engagement system
var bonusApples = [];
window.__snakeBonusCount = 0;  // how many bonus apples to maintain (0 = disabled)

// Wall obstacles — spawned by engagement system for challenge
var walls = [];
window.__snakeWallCount = 0;   // how many wall segments to maintain (0 = disabled)

// Speed burst — temporary speed boost
window.__snakeSpeedBurst = 0;  // extra frame skip reduction (0 = no burst)
window.__snakeSpeedBurstTimer = 0;

// get random whole numbers in a specific range
// @see https://stackoverflow.com/a/1527820/2124254
function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// Manage bonus apples count
function syncBonusApples() {
  var target = window.__snakeBonusCount || 0;
  while (bonusApples.length < target) {
    bonusApples.push({
      x: getRandomInt(0, 25) * grid,
      y: getRandomInt(0, 25) * grid,
      color: ['gold', 'cyan', 'magenta', 'lime'][bonusApples.length % 4],
      points: 2
    });
  }
  while (bonusApples.length > target) bonusApples.pop();
}

// Manage wall obstacles count
function syncWalls() {
  var target = window.__snakeWallCount || 0;
  while (walls.length < target) {
    var wx = getRandomInt(3, 22) * grid;
    var wy = getRandomInt(3, 22) * grid;
    var horizontal = Math.random() > 0.5;
    var seg = [];
    for (var w = 0; w < 3; w++) {
      seg.push({ x: horizontal ? wx + w * grid : wx, y: horizontal ? wy : wy + w * grid });
    }
    walls.push(seg);
  }
  while (walls.length > target) walls.pop();
}

// game loop
function loop() {
  requestAnimationFrame(loop);

  // slow game loop with speed burst support
  var effectiveSkip = window.__snakeFrameSkip != null ? window.__snakeFrameSkip : 3;
  if (window.__snakeSpeedBurst > 0) {
    effectiveSkip = Math.max(1, effectiveSkip - window.__snakeSpeedBurst);
    window.__snakeSpeedBurstTimer--;
    if (window.__snakeSpeedBurstTimer <= 0) window.__snakeSpeedBurst = 0;
  }
  if (++count < effectiveSkip) {
    return;
  }

  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  // Sync dynamic elements
  syncBonusApples();
  syncWalls();

  // move snake by it's velocity
  snake.x += snake.dx;
  snake.y += snake.dy;

  // wrap snake position horizontally on edge of screen
  if (snake.x < 0) {
    snake.x = canvas.width - grid;
  }
  else if (snake.x >= canvas.width) {
    snake.x = 0;
  }

  // wrap snake position vertically on edge of screen
  if (snake.y < 0) {
    snake.y = canvas.height - grid;
  }
  else if (snake.y >= canvas.height) {
    snake.y = 0;
  }

  // keep track of where snake has been. front of the array is always the head
  snake.cells.unshift({x: snake.x, y: snake.y});

  // remove cells as we move away from them
  if (snake.cells.length > snake.maxCells) {
    snake.cells.pop();
  }

  // draw apple
  context.fillStyle = 'red';
  context.fillRect(apple.x, apple.y, grid-1, grid-1);

  // Draw bonus apples
  for (var bi = 0; bi < bonusApples.length; bi++) {
    var ba = bonusApples[bi];
    context.fillStyle = ba.color;
    context.fillRect(ba.x, ba.y, grid-1, grid-1);
    // Pulsing glow effect
    context.strokeStyle = ba.color;
    context.lineWidth = 1;
    context.strokeRect(ba.x - 1, ba.y - 1, grid + 1, grid + 1);
  }

  // Draw wall obstacles
  context.fillStyle = '#666';
  for (var wi = 0; wi < walls.length; wi++) {
    var seg = walls[wi];
    for (var ws = 0; ws < seg.length; ws++) {
      context.fillRect(seg[ws].x, seg[ws].y, grid-1, grid-1);
    }
  }

  // draw snake one cell at a time
  context.fillStyle = 'green';
  snake.cells.forEach(function(cell, index) {

    // drawing 1 px smaller than the grid creates a grid effect in the snake body so you can see how long it is
    context.fillRect(cell.x, cell.y, grid-1, grid-1);

    // snake ate apple
    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;

      // canvas is 400x400 which is 25x25 grids
      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    // snake ate bonus apple — extra growth + respawn
    for (var bi = 0; bi < bonusApples.length; bi++) {
      if (cell.x === bonusApples[bi].x && cell.y === bonusApples[bi].y) {
        snake.maxCells += bonusApples[bi].points;
        bonusApples[bi].x = getRandomInt(0, 25) * grid;
        bonusApples[bi].y = getRandomInt(0, 25) * grid;
      }
    }

    // snake hit wall obstacle — reset game
    for (var wi = 0; wi < walls.length; wi++) {
      var seg = walls[wi];
      for (var ws = 0; ws < seg.length; ws++) {
        if (cell.x === seg[ws].x && cell.y === seg[ws].y && index === 0) {
          snake.x = 160;
          snake.y = 160;
          snake.cells = [];
          snake.maxCells = 4;
          snake.dx = grid;
          snake.dy = 0;
          apple.x = getRandomInt(0, 25) * grid;
          apple.y = getRandomInt(0, 25) * grid;
        }
      }
    }

    // check collision with all cells after this one (modified bubble sort)
    for (var i = index + 1; i < snake.cells.length; i++) {

      // snake occupies same space as a body part. reset game
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        snake.x = 160;
        snake.y = 160;
        snake.cells = [];
        snake.maxCells = 4;
        snake.dx = grid;
        snake.dy = 0;

        apple.x = getRandomInt(0, 25) * grid;
        apple.y = getRandomInt(0, 25) * grid;
      }
    }
  });
}

// listen to keyboard events to move the snake
document.addEventListener('keydown', function(e) {
  // prevent snake from backtracking on itself by checking that it's
  // not already moving on the same axis (pressing left while moving
  // left won't do anything, and pressing right while moving left
  // shouldn't let you collide with your own body)

  // left arrow key
  if (e.which === 37 && snake.dx === 0) {
    snake.dx = -grid;
    snake.dy = 0;
  }
  // up arrow key
  else if (e.which === 38 && snake.dy === 0) {
    snake.dy = -grid;
    snake.dx = 0;
  }
  // right arrow key
  else if (e.which === 39 && snake.dx === 0) {
    snake.dx = grid;
    snake.dy = 0;
  }
  // down arrow key
  else if (e.which === 40 && snake.dy === 0) {
    snake.dy = grid;
    snake.dx = 0;
  }
});

// start the game
requestAnimationFrame(loop);
</script>
<script src="../js/mod-overlay.js"></script>
<script src="mod_snake.js"></script>
</body>
</html>
